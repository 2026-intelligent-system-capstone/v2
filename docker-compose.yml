services:
  api:
    container_name: project-evaluation-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      APP_SQLITE_PATH: /app/data/app.db
      APP_ARTIFACT_DIR: /app/data/artifacts
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - project_evaluation_app_data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app

  streamlit:
    container_name: project-evaluation-streamlit
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
    command:
      [
        "streamlit",
        "run",
        "apps/streamlit/Home.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health')\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app

  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: project-evaluation-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - project_evaluation_qdrant_storage:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c '</dev/tcp/127.0.0.1/6333'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app

volumes:
  project_evaluation_app_data:
  project_evaluation_qdrant_storage:

networks:
  app:
    driver: bridge
