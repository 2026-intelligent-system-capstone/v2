services:
  api:
    container_name: dialearn-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      APP_SQLITE_PATH: /app/data/app.db
      APP_ARTIFACT_DIR: /app/data/artifacts
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - dialearn_app_data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - proxy

  streamlit:
    container_name: dialearn-streamlit
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_BASE_URL: https://dialearn.presso.ac/api
    depends_on:
      api:
        condition: service_healthy
    command:
      [
        "streamlit",
        "run",
        "apps/streamlit/Home.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health')\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - proxy

  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: dialearn-qdrant
    restart: unless-stopped
    volumes:
      - dialearn_qdrant_storage:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c '</dev/tcp/127.0.0.1/6333'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - proxy

volumes:
  dialearn_app_data:
    external: true
    name: dialearn_app_data
  dialearn_qdrant_storage:
    external: true
    name: dialearn_qdrant_storage

networks:
  proxy:
    external: true
    name: proxy
